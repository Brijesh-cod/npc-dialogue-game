<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC Dialogue Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- NPC Display -->
        <div class="npc-section">
            <div class="npc-portrait">
                <div class="avatar" id="avatar">🧙</div>
            </div>
            <div class="npc-info">
                <h2 id="npcName">Aldric the Mage</h2>
                <div class="mood-badge" id="moodBadge">Neutral</div>
                <p id="npcTitle">Court Wizard</p>
            </div>
        </div>

        <!-- Dialogue Display -->
        <div class="dialogue-section">
            <div class="dialogue-box" id="dialogueBox">
                <p id="dialogueText">Greetings, traveler. I haven't seen you around this village before. Are you passing through, or looking for work?</p>
            </div>
            <div class="emotion-indicator" id="emotionIndicator">
                <span>Mood: <strong id="moodText">Neutral</strong></span>
                <span>Trust: <strong id="trustText">0%</strong></span>
            </div>
        </div>

        <!-- Memory & State Display -->
        <div class="state-section">
            <details>
                <summary>Character Memory</summary>
                <div id="memoryList" class="memory-list">
                    <p><em>No memories yet...</em></p>
                </div>
            </details>
            <details>
                <summary>Quest Log</summary>
                <div id="questLog" class="quest-list">
                    <p><em>No quests yet...</em></p>
                </div>
            </details>
            <details>
                <summary>Inventory</summary>
                <div id="inventory" class="inventory-list">
                    <p><em>Empty</em></p>
                </div>
            </details>
        </div>

        <!-- Dialogue Options -->
        <div class="options-section" id="optionsSection">
            <!-- Dynamically populated -->
        </div>

        <!-- Player Input -->
        <div class="input-section">
            <input 
                type="text" 
                id="playerInput" 
                placeholder="Say something (or type a custom dialogue)"
                @keyup.enter="sendMessage"
            >
            <button onclick="sendMessage()">Send</button>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel">
            <details>
                <summary>Debug Info</summary>
                <div class="debug-controls">
                    <button onclick="switchNPC('aldric')">Aldric</button>
                    <button onclick="switchNPC('elena')">Elena</button>
                    <button onclick="switchNPC('marcus')">Marcus</button>
                    <button onclick="switchNPC('lyra')">Lyra</button>
                </div>
                <pre id="debugInfo"></pre>
                <button onclick="resetGame()">Reset Game</button>
            </details>
        </div>
    </div>

    <script src="npc.js"></script>
    <script src="game.js"></script>
</body>
</html>
