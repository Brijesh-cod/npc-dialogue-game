<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC Dialogue Game: AI Talk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pixelated">
    <main class="game-container">
        <header class="hero">
            <div class="npc-portrait">
                <div class="avatar-pixel" id="avatar" aria-hidden="true"></div>
            </div>
            <div class="hero-copy">
                <p class="eyebrow">AI roleplay chat</p>
                <h1 id="npcName">Aldric the Mage</h1>
                <p id="npcTitle">Court Wizard</p>
                <div class="mood-badge" id="moodBadge">Neutral</div>
                <p class="status-line" id="modelStatus">Loading AI model...</p>
            </div>
        </header>

        <section class="chat-panel" aria-label="NPC conversation">
            <div class="chat-log" id="chatLog"></div>
            <div class="chat-hint" id="chatHint">
                Speak to the NPC. The model will answer in character and remember the conversation.
            </div>
        </section>

        <section class="control-panel">
            <div class="npc-switcher" aria-label="Choose an NPC">
                <button class="ghost-button active" data-npc="aldric">Aldric</button>
                <button class="ghost-button" data-npc="elena">Elena</button>
                <button class="ghost-button" data-npc="marcus">Marcus</button>
                <button class="ghost-button" data-npc="lyra">Lyra</button>
            </div>

            <div class="quick-actions" aria-label="Quick prompts">
                <button class="action-button" data-prompt="Tell me about yourself.">About you</button>
                <button class="action-button" data-prompt="What do you want from me?">Goals</button>
                <button class="action-button" data-prompt="Do you have a quest for me?">Quest</button>
                <button class="action-button" data-prompt="What do you remember about me?">Memory</button>
            </div>
        </section>

        <section class="input-section">
            <input
                type="text"
                id="playerInput"
                placeholder="Say something to the NPC..."
                autocomplete="off"
            >
            <button id="sendButton" type="button">Talk</button>
        </section>

        <section class="state-section">
            <details open>
                <summary>Character Memory</summary>
                <div id="memoryList" class="memory-list"></div>
            </details>
            <details>
                <summary>Trust & Mood</summary>
                <div id="statusList" class="quest-list"></div>
            </details>
        </section>

        <section class="debug-panel">
            <details>
                <summary>Debug Info</summary>
                <pre id="debugInfo"></pre>
            </details>
        </section>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
